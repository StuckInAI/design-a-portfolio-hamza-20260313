version: '3.8'

services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-app
    ports:
      - '3000:3000'
    volumes:
      - portfolio_data:/data
    environment:
      - DATABASE_PATH=/data/portfolio.sqlite
      - NEXT_PUBLIC_SITE_TITLE=My Portfolio
      - NEXT_PUBLIC_SITE_DESCRIPTION=Developer Portfolio Website
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  portfolio_data:
    driver: local
